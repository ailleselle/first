<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Моё приглашение</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #fce4ec, #f8bbd0);
      font-family: Arial, sans-serif;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }

    button {
      margin-top: 20px;
      padding: 12px 25px;
      border: none;
      border-radius: 12px;
      background: #e91e63;
      color: white;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Ты приглашён ✨</h1>
    <p>Нажми кнопку ниже</p>
    <button onclick="alert('Жду тебя 💖')">Открыть</button>
  </div>
</body>
</html>
